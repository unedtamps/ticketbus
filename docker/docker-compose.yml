services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: ticketsaas-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - ticketsaas-network

  kafka-1:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketsaas-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - ticketsaas-network

  kafka-2:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketsaas-kafka-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - ticketsaas-network

  kafka-3:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketsaas-kafka-3
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29094,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - ticketsaas-network

  kafka-4:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketsaas-kafka-4
    ports:
      - "9095:9095"
    environment:
      KAFKA_BROKER_ID: 4
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29095,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-4:29095,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka4_data:/var/lib/kafka/data
    networks:
      - ticketsaas-network

  redis:
    image: redis:7-alpine
    container_name: ticketsaas-redis
    ports:
      - "6379:6379"
    command: >
      redis-server --notify-keyspace-events Ex
    volumes:
      - redis_data:/data
    networks:
      - ticketsaas-network

  postgres-auth:
    image: postgres:16-alpine
    container_name: ticketsaas-postgres-auth
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ticketsaas
      POSTGRES_PASSWORD: ticketsaas
      POSTGRES_DB: auth_db
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    networks:
      - ticketsaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketsaas -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-event:
    image: postgres:16-alpine
    container_name: ticketsaas-postgres-event
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ticketsaas
      POSTGRES_PASSWORD: ticketsaas
      POSTGRES_DB: event_db
    volumes:
      - pg_event_data:/var/lib/postgresql/data
    networks:
      - ticketsaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketsaas -d event_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16-alpine
    container_name: ticketsaas-postgres-inventory
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ticketsaas
      POSTGRES_PASSWORD: ticketsaas
      POSTGRES_DB: inventory_db
    volumes:
      - pg_inv_data:/var/lib/postgresql/data
    networks:
      - ticketsaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketsaas -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    container_name: ticketsaas-postgres-payment
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ticketsaas
      POSTGRES_PASSWORD: ticketsaas
      POSTGRES_DB: payment_db
    volumes:
      - pg_pay_data:/var/lib/postgresql/data
    networks:
      - ticketsaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketsaas -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.3
    container_name: ticketsaas-traefik
    ports:
      - "8000:8000"
      - "8085:8085"
    volumes:
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ticketsaas-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ticketsaas-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - kafka-4
    networks:
      - ticketsaas-network

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  kafka4_data:
  redis_data:
  pg_auth_data:
  pg_event_data:
  pg_inv_data:
  pg_pay_data:

networks:
  ticketsaas-network:
    driver: bridge
